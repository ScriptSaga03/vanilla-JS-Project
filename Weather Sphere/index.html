<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Weather Sphere | Dynamic Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="weather-app">
      <div class="search-container">
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name..."
          autocomplete="off"
        />
        <button id="searchBtn">🔍</button>
      </div>

      <div id="weatherDisplay" class="display-hidden">
        <div class="main-info">
          <h1 id="cityName">---</h1>
          <p id="dateTime">---</p>
          <div class="temp-container">
            <img id="weatherIcon" src="" alt="" />
            <span id="temperature">--</span><span class="unit">°C</span>
          </div>
          <h3 id="description">Fetching sky status...</h3>
        </div>

        <div class="details-grid">
          <div class="detail-card">
            <span>Humidity</span>
            <b id="humidity">0%</b>
          </div>
          <div class="detail-card">
            <span>Wind Speed</span>
            <b id="windSpeed">0 km/h</b>
          </div>
          <div class="detail-card">
            <span>Pressure</span>
            <b id="pressure">0 hPa</b>
          </div>
        </div>
      </div>

      <div id="statusMsg">Enter a city to see the magic! ✨</div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
